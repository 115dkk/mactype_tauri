name: Build MacType Control Center

run-name: Build Control Center ${{ inputs.version }} from ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version embedded in the generated installer
        required: true
        default: 0.1.0
        type: string

permissions:
  contents: read

jobs:
  legacy-core:
    name: Build MacType x86/x64 core
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - name: Build public dependencies and MacType core
        shell: pwsh
        run: .github/scripts/Build-LegacyCore.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: mactype-legacy-core
          path: artifacts/legacy-core
          if-no-files-found: error
          retention-days: 14

  control-center:
    name: Build Windows application and installer
    needs: legacy-core
    runs-on: windows-2022
    timeout-minutes: 45
    env:
      APP_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate installer version
        shell: pwsh
        run: |
          if ($env:APP_VERSION -notmatch '^[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?$') {
            throw "Version must look like 1.2.3 or 1.2.3-preview.1, got '$env:APP_VERSION'."
          }
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: control-center/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - uses: microsoft/setup-msbuild@v2
      - uses: actions/download-artifact@v4
        with:
          name: mactype-legacy-core
          path: artifacts/legacy-core
      - name: Install frontend dependencies
        working-directory: control-center
        run: pnpm install --frozen-lockfile
      - name: Build preview helper, frontend, and Tauri application
        shell: pwsh
        run: .github/scripts/Build-ControlCenter.ps1 -Configuration Release -SkipInstall
      - name: Build per-user installer
        shell: pwsh
        run: |
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' `
            /DAppVersion="$env:APP_VERSION" `
            /DSourceRoot="${{ github.workspace }}" `
            /DOutputRoot="${{ github.workspace }}\artifacts\installer" `
            /DAppExe="${{ github.workspace }}\artifacts\application\MacType Control Center.exe" `
            /DPreviewExe="${{ github.workspace }}\build\preview-helper\Release\mactype-preview32.exe" `
            /DCoreRoot="${{ github.workspace }}\artifacts\legacy-core" `
            installer\mactype-control-center.iss
      - name: Write SHA-256 checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem artifacts/installer/*.exe | Select-Object -First 1
          if (-not $installer) { throw 'The installer was not created.' }
          $hash = (Get-FileHash -Algorithm SHA256 $installer.FullName).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content -Encoding ascii artifacts/installer/SHA256SUMS.txt
      - name: Upload installable build
        uses: actions/upload-artifact@v4
        with:
          name: mactype-control-center-${{ inputs.version }}
          path: |
            artifacts/installer/*.exe
            artifacts/installer/SHA256SUMS.txt
            artifacts/application/MacType Control Center.exe
            build/preview-helper/Release/mactype-preview32.exe
          if-no-files-found: error
          retention-days: 14
