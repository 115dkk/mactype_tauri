name: Frontend window gallery

on:
  pull_request:
  push:
    branches: [directwrite, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gallery:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: control-center/pnpm-lock.yaml
      - name: Install
        working-directory: control-center
        run: pnpm install --frozen-lockfile
      - name: Install browser
        working-directory: control-center
        run: pnpm exec playwright install --with-deps chromium
      - name: Production build
        working-directory: control-center
        run: pnpm build
      - name: Render every window and fail on crash
        working-directory: control-center
        run: pnpm test:gallery
      - name: Lighthouse production quality gate
        shell: bash
        working-directory: control-center
        run: |
          pnpm preview --host 127.0.0.1 > ../artifacts/frontend-gallery/vite-preview.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              break
            fi
            sleep 1
          done
          for run in 1 2 3; do
            npx --yes lighthouse@13.4.0 'http://localhost:4173/?view=overview' \
              --quiet \
              --chrome-flags='--headless --no-sandbox' \
              --output=json \
              --output-path="../artifacts/frontend-gallery/lighthouse-$run.json"
          done
          node ../scripts/ci/Assert-Lighthouse.mjs ../artifacts/frontend-gallery/lighthouse-*.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-window-gallery
          path: artifacts/frontend-gallery
          if-no-files-found: error
