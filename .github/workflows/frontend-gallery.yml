name: Frontend window gallery

on:
  pull_request:
  push:
    branches: [directwrite, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gallery:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: control-center/pnpm-lock.yaml
      - name: Install
        working-directory: control-center
        run: pnpm install --frozen-lockfile
      - name: Install browser
        working-directory: control-center
        run: pnpm exec playwright install --with-deps chromium
      - name: Production build
        working-directory: control-center
        run: pnpm build
      - name: Render every window and fail on crash
        working-directory: control-center
        run: pnpm test:gallery
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-window-gallery
          path: artifacts/frontend-gallery
          if-no-files-found: error
      - name: Collect profile workflow review evidence
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/profile-workflow-review-evidence
          find artifacts/frontend-gallery -maxdepth 1 -type f \
            \( -name '*-profile-direct-save-apply-en.png' \
            -o -name '*-profile-read-only-save-as-en.png' \
            -o -name '*-profile-read-only-save-as-required-en.png' \
            -o -name '*-profile-direct-open-en.png' \
            -o -name '*-profile-external-import-required-en.png' \
            -o -name '*-profile-external-import-en.png' \) \
            -exec cp {} artifacts/profile-workflow-review-evidence/ \;
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: profile-workflow-review-evidence
          path: artifacts/profile-workflow-review-evidence
          if-no-files-found: error
