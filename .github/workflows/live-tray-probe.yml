# Machine-scoped demo: proves the legacy MacTray tray-mode guard against the
# real MacType installation on the prepared self-hosted machine. This file
# lives only on codex/tray-mode-guard and must not be merged onward; the
# upstream PR branch keeps manual builds only.
name: Live MacTray tray-mode probe

on:
  workflow_dispatch:
  push:
    branches: [codex/tray-mode-guard]
    paths: [".github/workflows/live-tray-probe.yml"]

permissions:
  contents: read

concurrency:
  group: live-tray-probe
  cancel-in-progress: false

jobs:
  live-probe:
    runs-on: [self-hosted, mactype-live]
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
    env:
      # Reuse the prepared cargo cache on the demo machine; a cold build of
      # the Tauri stack would dominate the run time.
      CARGO_TARGET_DIR: E:\mactype_tauri\control-center\src-tauri\target
    steps:
      # actions/checkout's temp-directory cleanup hits EBUSY on this machine
      # (system-wide MacType injection holds the handle), so check out by hand.
      - name: Checkout
        run: |
          if (-not (Test-Path .git)) {
            git init .
            git remote add origin "https://github.com/$env:GITHUB_REPOSITORY.git"
          }
          git fetch origin $env:GITHUB_SHA
          git checkout --force $env:GITHUB_SHA
          git clean -fdx -e node_modules
          git log -1 --oneline

      - name: Demo precondition — MacType is installed on this machine
        run: |
          if (-not (Test-Path 'C:\Program Files\MacType\MacTray.exe')) {
            throw 'MacType is not installed on this runner; this demo only runs on the prepared machine'
          }

      - name: Demo precondition — only the session-0 legacy service is running
        run: |
          $all = @(Get-CimInstance Win32_Process -Filter "Name='MacTray.exe'")
          $all | Select-Object ProcessId, SessionId | Format-Table | Out-String | Write-Host
          if ($all | Where-Object { $_.SessionId -ne 0 }) {
            throw 'an interactive MacTray is already running; quit it before the demo'
          }

      - name: Expose corepack pnpm shims
        run: Add-Content $env:GITHUB_PATH "$env:USERPROFILE\.corepack-bin"

      - name: Install frontend dependencies
        working-directory: control-center
        run: corepack pnpm install --frozen-lockfile

      - name: Build frontend bundle for the Tauri context
        working-directory: control-center
        run: corepack pnpm build

      - name: "Probe 1/3 — service mode only, guard must stay clear"
        working-directory: control-center/src-tauri
        env:
          MACTYPE_LIVE_TRAY_EXPECT: clear
        run: cargo test --lib machine_integration::legacy_tray::tests::live_probe_matches_expectation -- --ignored --exact --nocapture

      - name: Launch the real MacTray in tray mode
        run: |
          Start-Process 'C:\Program Files\MacType\MacTray.exe'
          $deadline = (Get-Date).AddSeconds(15)
          do {
            Start-Sleep -Milliseconds 250
            $tray = @(Get-CimInstance Win32_Process -Filter "Name='MacTray.exe'" | Where-Object { $_.SessionId -ne 0 })
          } until ($tray -or (Get-Date) -gt $deadline)
          if (-not $tray) { throw 'tray-mode MacTray did not appear within 15 seconds' }
          Get-CimInstance Win32_Process -Filter "Name='MacTray.exe'" | Select-Object ProcessId, SessionId | Format-Table | Out-String | Write-Host

      - name: "Probe 2/3 — tray mode running, guard must report the conflict"
        working-directory: control-center/src-tauri
        env:
          MACTYPE_LIVE_TRAY_EXPECT: conflict
        run: cargo test --lib machine_integration::legacy_tray::tests::live_probe_matches_expectation -- --ignored --exact --nocapture

      - name: Quit the tray-mode MacTray (the recheck scenario)
        run: |
          Get-CimInstance Win32_Process -Filter "Name='MacTray.exe'" |
            Where-Object { $_.SessionId -ne 0 } |
            ForEach-Object { Stop-Process -Id $_.ProcessId -Force -Confirm:$false }
          $deadline = (Get-Date).AddSeconds(15)
          do {
            Start-Sleep -Milliseconds 250
            $tray = @(Get-CimInstance Win32_Process -Filter "Name='MacTray.exe'" | Where-Object { $_.SessionId -ne 0 })
          } until (-not $tray -or (Get-Date) -gt $deadline)
          if ($tray) { throw 'tray-mode MacTray survived the quit' }
          Get-CimInstance Win32_Process -Filter "Name='MacTray.exe'" | Select-Object ProcessId, SessionId | Format-Table | Out-String | Write-Host

      - name: "Probe 3/3 — after quitting, guard must clear again"
        working-directory: control-center/src-tauri
        env:
          MACTYPE_LIVE_TRAY_EXPECT: clear
        run: cargo test --lib machine_integration::legacy_tray::tests::live_probe_matches_expectation -- --ignored --exact --nocapture

      - name: Cleanup — never leave a tray-mode MacTray behind
        if: always()
        run: |
          Get-CimInstance Win32_Process -Filter "Name='MacTray.exe'" |
            Where-Object { $_.SessionId -ne 0 } |
            ForEach-Object { Stop-Process -Id $_.ProcessId -Force -Confirm:$false }
