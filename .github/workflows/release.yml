name: Release installer

on:
  push:
    tags: ["control-center-v*"]

permissions:
  contents: write

jobs:
  build-release:
    uses: ./.github/workflows/build.yml

  publish:
    needs: build-release
    runs-on: windows-2022
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mactype-control-center-windows
          path: release
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/artifacts/installer/MacType-Control-Center.zip
            release/artifacts/installer/SHA256SUMS.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: true
