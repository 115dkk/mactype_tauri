; MacType Control Center Default profile
; Scalar values verified byte-for-byte against the official MacType
; distribution's ini\Default.ini (release v1.2023.5.31, the newest release
; published in an extractable archive; the file itself is unchanged since 2021).
; Comments and structure are original to this repository. GPL-3.0-or-later.
; Sections that depend on fonts bundled only with the closed distribution
; (XSong substitutes and their [Individual] tuning) are intentionally omitted.

[General]
Name=Control Center Default
HookChildProcesses=1
HintingMode=1
AntiAliasMode=4
NormalWeight=16
BoldWeight=2
ItalicSlant=0
UseMapping=0
GammaMode=0
GammaValue=1.5
Contrast=1.7
RenderWeight=1.4
DirectWrite=1
TextTuning=0
TextTuningR=4
TextTuningG=4
TextTuningB=4
BolderMode=0
FontLoader=0
FontLink=2
FontSubstitutes=0
MaxHeight=0
LcdFilter=2
LoadOnDemand=1
CacheMaxFaces=256
CacheMaxSizes=6140
CacheMaxBytes=20485760

[DirectWrite]
RenderingMode=6
GammaValue=1.5
Contrast=1.0
ClearTypeLevel=1

[Individual]
; FontName=Hinting,AAMode,NormalWeight,BoldWeight,ItalicSlant,Kerning

[Exclude]

[Include]

[ExcludeModule]

[IncludeModule]

[UnloadDLL]
fontview.exe
dwm.exe
SearchFilterHost.exe
SearchProtocolHost.exe
mspdbsrv.exe
