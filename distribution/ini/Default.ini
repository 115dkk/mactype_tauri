[General]
Name=Control Center Default
HookChildProcesses=0
HintingMode=1
AntiAliasMode=4
NormalWeight=8
BoldWeight=1
ItalicSlant=0
EnableKerning=1
GammaMode=0
GammaValue=1.4
Contrast=1.1
RenderWeight=1.2
TextTuning=0
TextTuningR=4
TextTuningG=4
TextTuningB=4
BolderMode=0
FontLoader=0
FontLink=2
LcdFilter=2
LoadOnDemand=1
MaxBitmap=0
MaxHeight=0
HintSmallFont=0
DirectWrite=1

[DirectWrite]
RenderingMode=5
GammaValue=1.1
Contrast=1.0
ClearTypeLevel=1.0

[Individual]
; FontName=Hinting,AAMode,NormalWeight,BoldWeight,ItalicSlant,Kerning

